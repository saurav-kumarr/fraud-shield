server:
  port: 8085

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/fraudshielddb?TimeZone=Asia/Kolkata
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    mongodb:
      uri: mongodb://localhost:27017/fraudshielddb
      database: fraudshielddb

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: report-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "com.fraudshield.fraud.dto.FraudAlertEvent:com.fraudshield.report.dto.FraudAlertEvent"
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000

  cloud:
    stream:
      kafka:
        binder:
          consumer-properties:
            value.deserializer: org.apache.kafka.common.serialization.StringDeserializer
            key.deserializer: org.apache.kafka.common.serialization.StringDeserializer


kafka:
  topic:
    fraud-alerts: fraud-alerts

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"