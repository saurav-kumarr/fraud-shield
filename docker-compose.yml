

services:

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: fraud-shield-postgres
    environment:
      POSTGRES_DB: fraudshielddb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fraud-shield-network

  # MongoDB
  mongodb:
    image: mongo:6
    container_name: fraud-shield-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fraud-shield-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: fraud-shield-redis
    ports:
      - "6379:6379"
    networks:
      - fraud-shield-network

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: fraud-shield-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fraud-shield-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: fraud-shield-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    networks:
      - fraud-shield-network

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: fraud-shield-prometheus
    ports:
      - "9090:9090"
    networks:
      - fraud-shield-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: fraud-shield-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    networks:
      - fraud-shield-network

networks:
  fraud-shield-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data: